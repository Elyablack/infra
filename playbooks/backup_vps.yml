- name: Backup VPS
  hosts: vps
  become: true

  vars:
    backup_dir: /srv/backups
    backup_name: "vps-backup-{{ ansible_facts.date_time.date }}-{{ ansible_facts.date_time.hour }}{{ ansible_facts.date_time.minute }}.tar.gz"    

  tasks:

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Create backup archive
      archive:
        path:
          - /srv/monitoring
          - /etc
        dest: "{{ backup_dir }}/{{ backup_name }}"
        format: gz

    - name: Remove old backups (keep 7)
      shell: |
        ls -t /srv/backups/vps-backup-*.tar.gz | tail -n +8 | xargs -r rm
